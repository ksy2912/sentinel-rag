# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect repo: https://github.com/ksy2912/sentinel-rag → New Blueprint

databases:
  - name: sentinel-rag-db
    plan: free
    databaseName: rag
    user: rag
    postgresMajorVersion: "16"

services:
  - type: web
    name: sentinel-rag-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sentinel-rag-db
          property: connectionString
      - key: ALLOW_MOCK_LLM
        value: "false"
      - key: EMBEDDING_DIM
        value: "768"
      - key: OPENAI_EMBED_MODEL
        value: text-embedding-3-small
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: OPENROUTER_HTTP_REFERER
        value: https://sentinel-rag-web.onrender.com
      - key: OPENROUTER_APP_TITLE
        value: sentinel-rag
      - key: RAG_TOP_K
        value: "8"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: sentinel-rag-web
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: API_URL
        value: https://sentinel-rag-api.onrender.com
